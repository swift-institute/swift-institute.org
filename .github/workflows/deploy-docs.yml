name: Deploy DocC

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift 6.3
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3"

      - name: Show toolchain
        run: |
          swift --version
          xcrun docc --version || true

      - name: Build symbol graphs
        run: |
          swift build --target "Swift Institute" \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir \
            -Xswiftc "$(pwd)/.build/symbol-graphs"

      - name: Convert DocC catalog
        run: |
          xcrun docc convert "Swift Institute.docc" \
            --additional-symbol-graph-dir .build/symbol-graphs \
            --transform-for-static-hosting \
            --output-path ./docc-output

      - name: Post-process nav title
        run: |
          sed -i '' 's/VUE_APP_TITLE:"Documentation"/VUE_APP_TITLE:"Swift Institute"/g' ./docc-output/js/index.*.js
          sed -i '' 's/"documentation":{"title":"Documentation"/"documentation":{"title":"Swift Institute"/g' ./docc-output/js/index.*.js

      - name: Inject Open Graph meta into DocC shell
        run: |
          sed -i '' 's|<title>Documentation</title>|<title>Swift Institute</title><meta property="og:title" content="Swift Institute"/><meta property="og:description" content="The integrated Swift package ecosystem. Primitives, standards, and foundations."/><meta property="og:type" content="website"/><meta property="og:url" content="https://swift-institute.org/documentation/swift_institute/"/><meta name="twitter:card" content="summary"/><meta name="twitter:title" content="Swift Institute"/><meta name="twitter:description" content="The integrated Swift package ecosystem. Primitives, standards, and foundations."/><meta name="description" content="The integrated Swift package ecosystem. Primitives, standards, and foundations."/>|g' ./docc-output/documentation/swift_institute/index.html

      - name: Add root redirect + CNAME
        run: |
          cat > ./docc-output/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=/documentation/swift_institute/">
            <link rel="canonical" href="https://swift-institute.org/documentation/swift_institute/">
            <title>Swift Institute</title>
            <meta property="og:title" content="Swift Institute"/>
            <meta property="og:description" content="The integrated Swift package ecosystem. Primitives, standards, and foundations."/>
            <meta property="og:type" content="website"/>
            <meta property="og:url" content="https://swift-institute.org/documentation/swift_institute/"/>
            <meta name="twitter:card" content="summary"/>
            <meta name="twitter:title" content="Swift Institute"/>
            <meta name="twitter:description" content="The integrated Swift package ecosystem. Primitives, standards, and foundations."/>
            <meta name="description" content="The integrated Swift package ecosystem. Primitives, standards, and foundations."/>
          </head>
          <body>
            <p>Redirecting to <a href="/documentation/swift_institute/">Swift Institute documentation</a>…</p>
          </body>
          </html>
          HTML
          echo "swift-institute.org" > ./docc-output/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docc-output

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
